name: Release Whisp Client

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Whisp (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runner: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            mihomo_asset: mihomo-windows-amd64
            mihomo_archive: zip
            bundle_glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - label: linux-x86_64
            runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            mihomo_asset: mihomo-linux-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          - label: macos-x86_64
            runner: macos-14
            triple: x86_64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - label: macos-aarch64
            runner: macos-14
            triple: aarch64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-arm64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        shell: bash
        run: |
          git fetch --tags
          BASE="v1.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $NF}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT
          VER="${NEW#v}"
          jq --arg v "$VER" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install Linux Tauri deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf

      - name: Resolve Whispera version
        id: wver
        shell: bash
        run: |
          # Use version pinned by dispatch payload; fall back to latest tag.
          PINNED="${{ github.event.client_payload.version }}"
          if [ -n "$PINNED" ]; then
            echo "tag=$PINNED" >> $GITHUB_OUTPUT
            echo "Using pinned version: $PINNED"
          else
            TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/Jalaveyan/Whispera/releases/latest" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using latest version: $TAG"
          fi

      - name: Download whispera-go-client
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          tag: ${{ steps.wver.outputs.tag }}
          fileName: 'whispera-go-client-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download whispera-ml-server
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          tag: ${{ steps.wver.outputs.tag }}
          fileName: 'whispera-ml-server-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download mihomo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MIHOMO_VER="v1.19.8"
          ASSET="${{ matrix.mihomo_asset }}"
          ARCH="${{ matrix.mihomo_archive }}"
          OUT="src-tauri/binaries/mihomo-${{ matrix.triple }}${{ matrix.ext }}"
          mkdir -p src-tauri/binaries
          BASE_URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}"
          if [ "$ARCH" = "zip" ]; then
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${BASE_URL}/${ASSET}-${MIHOMO_VER}.zip" -o mihomo.zip
            unzip -o mihomo.zip -d mihomo_tmp/
            mv mihomo_tmp/${ASSET}.exe "$OUT" 2>/dev/null || mv mihomo_tmp/mihomo*.exe "$OUT"
            rm -rf mihomo.zip mihomo_tmp/
          else
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${BASE_URL}/${ASSET}-${MIHOMO_VER}.gz" -o mihomo.gz
            gunzip -f mihomo.gz
            mv mihomo "$OUT"
            chmod +x "$OUT"
          fi

      - name: Make binaries executable (unix)
        if: matrix.runner != 'windows-latest'
        run: chmod +x src-tauri/binaries/*

      - name: Install frontend deps
        run: npm ci

      - name: Generate icon.icns
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -e
          SRC=src-tauri/icons/128x128@2x.png
          OUT=src-tauri/icons/icon.icns
          [ -f "$OUT" ] && exit 0
          if command -v iconutil >/dev/null 2>&1 && command -v sips >/dev/null 2>&1; then
            ICONSET=$(mktemp -d)/icon.iconset
            mkdir -p "$ICONSET"
            for s in 16 32 64 128 256 512 1024; do
              sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
              [ $s -le 512 ] && sips -z $((s*2)) $((s*2)) "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null || true
            done
            iconutil -c icns "$ICONSET" -o "$OUT"
          else
            python3 -m pip install --quiet --user Pillow
            python3 -c "from PIL import Image; Image.open('$SRC').resize((1024,1024), Image.LANCZOS).save('/tmp/icon-1024.png')"
            npx tauri icon /tmp/icon-1024.png
          fi
          ls -la "$OUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # macOS: только app + tar.gz (DMG bundle_dmg.sh флачит на CI hdiutil).
          args: ${{ contains(matrix.triple, 'apple-darwin') && '--target ' || '--target ' }}${{ matrix.triple }}${{ contains(matrix.triple, 'apple-darwin') && ' --bundles app' || '' }}
          includeDebug: false
          includeRelease: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisp-${{ matrix.label }}-installer
          path: ${{ matrix.bundle_glob }}
          retention-days: 5
          if-no-files-found: ignore

  # ── Android Build ──────────────────────────────────────────────────────────
  build-android:
    name: Build Whisp (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        shell: bash
        run: |
          git fetch --tags
          BASE="v1.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $NF}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT
          VER="${NEW#v}"
          jq --arg v "$VER" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.x'

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Resolve Whispera version (Android)
        id: wver
        shell: bash
        run: |
          PINNED="${{ github.event.client_payload.version }}"
          if [ -n "$PINNED" ]; then
            echo "tag=$PINNED" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/Jalaveyan/Whispera/releases/latest" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Download whispera-go-client (arm64)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          tag: ${{ steps.wver.outputs.tag }}
          fileName: 'whispera-go-client-aarch64-linux-android'
          out-file-path: src-tauri/binaries/
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download whispera-ml-server (arm64)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          tag: ${{ steps.wver.outputs.tag }}
          fileName: 'whispera-ml-server-aarch64-linux-android'
          out-file-path: src-tauri/binaries/
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: chmod +x sidecars
        run: chmod +x src-tauri/binaries/* 2>/dev/null || true

      - name: Install frontend deps
        run: npm ci

      - name: Upscale icon source to 1024x1024 for Tauri icon generator
        run: |
          python3 -m pip install --quiet --user Pillow
          mkdir -p src-tauri/icons-tmp
          python3 -c "from PIL import Image; Image.open('src-tauri/icons/128x128@2x.png').resize((1024,1024), Image.LANCZOS).save('src-tauri/icons-tmp/source.png')"
          npx tauri icon src-tauri/icons-tmp/source.png

      - name: Initialize Tauri Android project
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          npx tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sing-box AAR via gomobile
        shell: bash
        env:
          GONOSUMDB: "*"
          GOFLAGS: "-mod=mod"
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          MOBILE_VER="latest"
          go install golang.org/x/mobile/cmd/gomobile@${MOBILE_VER}
          go install golang.org/x/mobile/cmd/gobind@${MOBILE_VER}
          gomobile init
          mkdir -p src-tauri/gen/android/app/libs
          cd go-android
          go mod download
          SB_MOD="$(go env GOPATH)/pkg/mod/github.com/sagernet/sing-box@v1.13.12"
          cp -r "$SB_MOD" ./sing-box-patched
          chmod -R u+w ./sing-box-patched
          go run ./cmd/patch ./sing-box-patched
          echo "" >> go.mod
          echo "replace github.com/sagernet/sing-box v1.13.12 => ./sing-box-patched" >> go.mod
          export NDK_HOME="$ANDROID_NDK_HOME"
          gomobile bind \
            -target=android/arm64 \
            -androidapi=21 \
            -tags with_gvisor \
            -o ../src-tauri/gen/android/app/libs/singbox.aar \
            .
          ls -lh ../src-tauri/gen/android/app/libs/singbox.aar

      - name: Apply VpnService patch (Kotlin + manifest)
        run: bash src-tauri/android-patch/apply.sh

      - name: Install Gradle init script for singbox.aar
        run: |
          mkdir -p ~/.gradle/init.d
          cp src-tauri/android-patch/singbox.gradle ~/.gradle/init.d/singbox.gradle

      - name: Build Tauri Android APK (debug, auto-signed)
        id: tauri_build
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          set +e
          npx tauri android build --apk --debug --target aarch64 --verbose > tauri-build.log 2>&1
          BUILD_EXIT=$?
          set -e
          echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-build-log
          path: tauri-build.log
          if-no-files-found: warn

      - name: Show build errors
        if: failure()
        run: |
          if [ ! -f tauri-build.log ]; then echo "no build log"; exit 0; fi
          echo "##### FAILURE context (±20 lines) #####"
          grep -n "FAILURE\|What went wrong\|Caused by\|Unresolved\|error:" tauri-build.log \
            | awk -F: '{print $1}' | sort -nu | while read ln; do
                sed -n "$((ln>20?ln-20:1)),$((ln+20))p" tauri-build.log
                echo "---"
              done | head -300
          echo "##### tail 400 #####"
          tail -400 tauri-build.log

      - name: Locate APK
        run: |
          echo "=== APK files found ==="
          find src-tauri/gen/android -name "*.apk" 2>/dev/null || echo "(none)"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: whisp-android-apk
          path: src-tauri/gen/android/**/*.apk
          retention-days: 5
          if-no-files-found: warn

# ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, build-android]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: whisp-*-installer
          merge-multiple: true
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: whisp-android-apk
          path: release/
        continue-on-error: true

      - name: Calculate version
        id: ver
        run: |
          git fetch --tags
          BASE="v1.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $NF}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Whisp Client ${{ steps.ver.outputs.tag }}
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
