name: Release Whisp Client

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Whisp (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runner: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            mihomo_asset: mihomo-windows-amd64
            mihomo_archive: zip
            bundle_glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - label: linux-x86_64
            runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            mihomo_asset: mihomo-linux-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          - label: macos-x86_64
            runner: macos-14
            triple: x86_64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - label: macos-aarch64
            runner: macos-14
            triple: aarch64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-arm64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install Linux Tauri deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf

      - name: Download whispera-go-client
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-go-client-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/

      - name: Download whispera-ml-server
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-ml-server-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/

      - name: Download mihomo
        shell: bash
        run: |
          MIHOMO_VER="v1.19.8"
          ASSET="${{ matrix.mihomo_asset }}"
          ARCH="${{ matrix.mihomo_archive }}"
          OUT="src-tauri/binaries/mihomo-${{ matrix.triple }}${{ matrix.ext }}"
          mkdir -p src-tauri/binaries
          if [ "$ARCH" = "zip" ]; then
            curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${ASSET}-${MIHOMO_VER}.zip" -o mihomo.zip
            unzip -o mihomo.zip -d mihomo_tmp/
            mv mihomo_tmp/${ASSET}.exe "$OUT" || mv mihomo_tmp/mihomo*.exe "$OUT"
            rm -rf mihomo.zip mihomo_tmp/
          else
            curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${ASSET}-${MIHOMO_VER}.gz" -o mihomo.gz
            gunzip -f mihomo.gz
            mv mihomo "$OUT"
            chmod +x "$OUT"
          fi

      - name: Make binaries executable (unix)
        if: matrix.runner != 'windows-latest'
        run: chmod +x src-tauri/binaries/*

      - name: Generate macOS icon (icon.icns)
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -e
          ICON_DIR=src-tauri/icons
          SRC=$ICON_DIR/128x128@2x.png
          OUT=$ICON_DIR/icon.icns
          if [ -f "$OUT" ]; then exit 0; fi
          if command -v iconutil >/dev/null 2>&1 && command -v sips >/dev/null 2>&1; then
            ICONSET=$(mktemp -d)/icon.iconset
            mkdir -p "$ICONSET"
            for s in 16 32 64 128 256 512 1024; do
              sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
              [ $s -le 512 ] && sips -z $((s*2)) $((s*2)) "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null || true
            done
            iconutil -c icns "$ICONSET" -o "$OUT"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq icnsutils
            png2icns "$OUT" "$SRC"
          fi
          ls -la "$OUT"

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # macOS: только app + tar.gz (DMG bundle_dmg.sh флачит на CI hdiutil).
          args: ${{ contains(matrix.triple, 'apple-darwin') && '--target ' || '--target ' }}${{ matrix.triple }}${{ contains(matrix.triple, 'apple-darwin') && ' --bundles app' || '' }}
          includeDebug: false
          includeRelease: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisp-${{ matrix.label }}-installer
          path: ${{ matrix.bundle_glob }}
          retention-days: 5
          if-no-files-found: ignore

  # ── Android Build ──────────────────────────────────────────────────────────
  build-android:
    name: Build Whisp (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.x'

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download whispera-go-client (arm64)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-go-client-aarch64-linux-android'
          out-file-path: src-tauri/binaries/
        continue-on-error: true

      - name: Download whispera-ml-server (arm64)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-ml-server-aarch64-linux-android'
          out-file-path: src-tauri/binaries/
        continue-on-error: true

      - name: chmod +x sidecars
        run: chmod +x src-tauri/binaries/* 2>/dev/null || true

      - name: Install frontend deps
        run: npm ci

      - name: Upscale icon source to 1024x1024 for Tauri icon generator
        run: |
          python3 -m pip install --quiet --user Pillow
          mkdir -p src-tauri/icons-tmp
          python3 -c "from PIL import Image; Image.open('src-tauri/icons/128x128@2x.png').resize((1024,1024), Image.LANCZOS).save('src-tauri/icons-tmp/source.png')"
          npx tauri icon src-tauri/icons-tmp/source.png

      - name: Initialize Tauri Android project
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          npx tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sing-box AAR via gomobile
        shell: bash
        env:
          GONOSUMDB: "*"
          GOFLAGS: "-mod=mod"
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          MOBILE_VER="v0.0.0-20240213143359-d1f7d3436075"
          go install golang.org/x/mobile/cmd/gomobile@${MOBILE_VER}
          go install golang.org/x/mobile/cmd/gobind@${MOBILE_VER}
          gomobile init
          mkdir -p src-tauri/gen/android/app/libs
          cd go-android
          go mod download
          # Patch panic("fqdn too long") anywhere in the module cache → return error
          python3 - <<'PYEOF'
import os, re, subprocess
gopath = subprocess.check_output(['go', 'env', 'GOPATH'], text=True).strip()
FUNC_RE = re.compile(r'^func\s')
def go_zero(t):
    t = t.strip().split()[-1] if t.strip() else ''
    if t == 'error': return 'fmt.Errorf("fqdn too long")'
    if t == 'string': return '""'
    if t == 'bool': return 'false'
    if t.startswith(('*', '[', 'map', 'chan')) or t in ('interface{}', 'any', 'error'): return 'nil'
    if re.match(r'^u?int\d*$', t) or t in ('byte', 'rune', 'float32', 'float64', 'uintptr'): return '0'
    return 'nil'
def parse_rets(sig):
    m = re.search(r'\)\s*(\([^)]+\)|\S+)?\s*\{', sig)
    if not m or not m.group(1): return []
    r = m.group(1).strip()
    return [x.strip() for x in r.strip('()').split(',')] if r else []
found = False
for dp, _, files in os.walk(os.path.join(gopath, 'pkg', 'mod')):
    for fn in files:
        if not fn.endswith('.go'): continue
        fp = os.path.join(dp, fn)
        try:
            lines = open(fp, 'r', errors='replace').readlines()
        except: continue
        if not any('panic("fqdn too long")' in l for l in lines): continue
        found = True
        os.chmod(fp, 0o644)
        out, changed = [], False
        for i, line in enumerate(lines):
            if 'panic("fqdn too long")' not in line:
                out.append(line); continue
            func_line = next((lines[j].rstrip() for j in range(i-1,-1,-1) if FUNC_RE.match(lines[j])), '')
            rets = parse_rets(func_line)
            if not rets:
                print(f'SKIP unparseable at {fp}:{i+1}: {func_line!r}')
                out.append(line); continue
            ind = ' ' * (len(line) - len(line.lstrip()))
            out.append(ind + 'return ' + ', '.join(go_zero(r) for r in rets) + '\n')
            changed = True
            print(f'Patched {fp}:{i+1}')
        if changed:
            c = ''.join(out)
            if 'fmt.Errorf' in c and '"fmt"' not in c:
                c = re.sub(r'(import\s*\()', r'\1\n\t"fmt"', c, count=1)
            open(fp, 'w').write(c)
if not found:
    print('NOTE: panic("fqdn too long") not found in module cache')
PYEOF
          SB_MOD="$(go env GOPATH)/pkg/mod/github.com/sagernet/sing-box@v1.10.7"
          cp -r "$SB_MOD" ./sing-box-patched
          chmod -R u+w ./sing-box-patched
          python3 patch_singbox.py ./sing-box-patched
          echo "" >> go.mod
          echo "replace github.com/sagernet/sing-box v1.10.7 => ./sing-box-patched" >> go.mod
          export NDK_HOME="$ANDROID_NDK_HOME"
          gomobile bind \
            -target=android/arm64 \
            -androidapi=21 \
            -o ../src-tauri/gen/android/app/libs/singbox.aar \
            .
          ls -lh ../src-tauri/gen/android/app/libs/singbox.aar

      - name: Apply VpnService patch (Kotlin + manifest)
        run: bash src-tauri/android-patch/apply.sh

      - name: Install Gradle init script for singbox.aar
        run: |
          mkdir -p ~/.gradle/init.d
          cp src-tauri/android-patch/singbox.gradle ~/.gradle/init.d/singbox.gradle

      - name: Build Tauri Android APK (debug, auto-signed)
        id: tauri_build
        continue-on-error: true
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          npx tauri android build --apk --debug --target aarch64 --verbose > tauri-build.log 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-build-log
          path: tauri-build.log
          if-no-files-found: warn

      - name: Show build errors
        if: always()
        run: |
          if [ ! -f tauri-build.log ]; then echo "no build log"; exit 0; fi
          echo "##### FAILURE context (±20 lines) #####"
          grep -n "FAILURE\|What went wrong\|Caused by\|Unresolved\|error:" tauri-build.log \
            | awk -F: '{print $1}' | sort -nu | while read ln; do
                sed -n "$((ln>20?ln-20:1)),$((ln+20))p" tauri-build.log
                echo "---"
              done | head -300
          echo "##### tail 400 #####"
          tail -400 tauri-build.log

      - name: Fail if build failed
        if: steps.tauri_build.outputs.exit_code != '0'
        run: exit 1

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: whisp-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 5

# ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, build-android]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: whisp-*-installer
          merge-multiple: true
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: whisp-android-apk
          path: release/
        continue-on-error: true

      - name: Calculate version
        id: ver
        run: |
          git fetch --tags
          BASE="v1.0.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $NF}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Whisp Client ${{ steps.ver.outputs.tag }}
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
