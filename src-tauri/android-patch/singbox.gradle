allprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.camera') {
                details.useVersion '1.4.2'
                details.because 'CameraX 1.5.x requires AGP 8.6.0; Tauri template pins AGP 8.5.1'
            }
        }
    }
}

allprojects {
    afterEvaluate { proj ->
        if (proj.name == 'app') {
            proj.dependencies {
                implementation proj.fileTree(dir: "${proj.projectDir}/libs", include: ['*.aar'])
            }
        }
    }
}
