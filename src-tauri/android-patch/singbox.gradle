allprojects {
    buildscript {
        configurations.all {
            resolutionStrategy {
                force 'com.android.tools.build:gradle:8.6.0'
            }
        }
    }
}

allprojects {
    afterEvaluate { proj ->
        if (proj.name == 'app') {
            proj.dependencies {
                implementation proj.fileTree(dir: "${proj.projectDir}/libs", include: ['*.aar'])
            }
        }
    }
}
